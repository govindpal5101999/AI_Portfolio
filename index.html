<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <!-- Vital viewport definition for mobile display rendering -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Govind Pal - AI Avatar Portfolio</title>

  <!-- Link External Layout Stylesheets -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/talkify-tts@4.0.0/dist/styles/classic-control-center/colors.min.css">

  <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/talkify-tts@4.0.0/dist/talkify.min.js"></script>
</head>

<body>

  <div class="container">
    <!-- Left Panel Column: 3D Graphics Processing -->
    <div class="avatar-panel">
      <div class="avatar-wrapper">
        <div id="avatarCanvas"></div>
        <div id="mouth" class="mouth"></div>
      </div>
      <div class="button-group">
        <button id="speakId" onclick="speakText()">Speak</button>
        <button id="skipId" onclick="skipSpeech()" disabled>Skip</button>
      </div>
    </div>

    <!-- Right Panel Column: Chatbot Dialogue Engine -->
    <div class="chat-panel">
      <div class="speech-container" id="speech">
        <p style="color: #888;">Click "Speak" to start the introduction or type a question below...</p>
      </div>

      <div id="chatBox">
        <input id="userInput" type="text" placeholder="Ask something about my experience, skills, DRDO projects...">
        <button id="askQuestions" onclick="handleUserMessage()">Ask</button>
      </div>
    </div>
  </div>
  <script>
    // System Core Pipeline State Containers
    var scene, camera, renderer, controls, model, mixer, clock;
    var lipInterval, speakActive = false;

    // DOM Anchors Optimization
    const mouth = document.getElementById('mouth') || document.createElement('div');
    var speechDiv = document.getElementById('speech') || document.createElement('div');
    var particleMesh, particlePositions, particleSpeeds;
    let handAnimInterval;

    init();

    function init() {
      scene = new THREE.Scene();

      const canvasContainer = document.getElementById('avatarCanvas');
      const width = canvasContainer ? canvasContainer.clientWidth : 500;
      const height = canvasContainer ? canvasContainer.clientHeight : 500;

      camera = new THREE.PerspectiveCamera(36, width / height, 0.1, 100);
      camera.position.set(0, 1.5, 3);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(width, height);
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      if (canvasContainer) {
        canvasContainer.appendChild(renderer.domElement);
      } else {
        document.body.appendChild(renderer.domElement);
      }

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1, 0);
      controls.enableZoom = false;
      controls.enableRotate = false;
      controls.enablePan = false;

      // Balanced Lighting Parameters
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
      dirLight.position.set(2, 4, 3);
      scene.add(dirLight);

      const fillLight = new THREE.PointLight(0x99ccff, 1.0);
      fillLight.position.set(-2, 2, 2);
      scene.add(fillLight);

      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);

      addSkyParticles();
      clock = new THREE.Clock();

      loadAndPoseModel();
      animate();

      // Dynamic Event Engine for Mobile Orientations
      window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
      const canvasContainer = document.getElementById('avatarCanvas');
      if (!canvasContainer) return;
      const width = canvasContainer.clientWidth;
      const height = canvasContainer.clientHeight;

      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    }

    function addSkyParticles() {
      const particlesCount = 8000;
      const geometry = new THREE.BufferGeometry();
      particlePositions = new Float32Array(particlesCount * 3);
      particleSpeeds = [];

      for (let i = 0; i < particlesCount; i++) {
        const i3 = i * 3;
        particlePositions[i3 + 0] = (Math.random() - 0.5) * 20;
        particlePositions[i3 + 1] = (Math.random() - 0.5) * 10;
        particlePositions[i3 + 2] = -(Math.random() * 10 + 3);
        particleSpeeds[i] = 0.001 + Math.random() * 0.002;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

      const material = new THREE.PointsMaterial({
        color: 0x00ffff,
        size: 0.06,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      particleMesh = new THREE.Points(geometry, material);
      scene.add(particleMesh);
    }


    function loadAndPoseModel() {
      const loader = new THREE.GLTFLoader();

      // Clean, relative paths are safer, but your 127.0.0.1 absolute path works too!
      loader.load("./model.glb", function (gltf) {

        // Fix 1: Safe removal of the old model
        if (model) {
          scene.remove(model);
        }

        model = gltf.scene;
        scene.add(model);
        model.position.set(0, -0.4, 0);
        model.scale.set(1, 1, 1);
        camera.position.set(0, 1.3, 1.5);
        camera.lookAt(new THREE.Vector3(0, 1.2, 0));

        // Fix 2: Clean up the old mixer before creating a new one to prevent memory leaks
        if (mixer) {
          mixer.stopAllAction();
          mixer = null;
        }

        if (gltf.animations && gltf.animations.length) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(clip => mixer.clipAction(clip).play());
        }

        if (typeof resetHands === "function") {
          resetHands();
        }

      }, undefined, function (err) {
        console.error("CORS Context or Loading Blockage Error:", err);
      });
    }

    // Fix 3: You MUST add this update logic inside your main animation loop!
    function animate() {
      requestAnimationFrame(animate);

      // This line is what actually drives the GLB animations forward in time
      if (mixer) {
        const delta = clock.getDelta();
        mixer.update(delta);
      }

      renderer.render(scene, camera);
    }

    function foldHands(targetModel) {
      if (!targetModel) return;
      const rightArm = targetModel.getObjectByName('RightArm') || targetModel.getObjectByName('mixamorig_RightArm');
      const leftArm = targetModel.getObjectByName('LeftArm') || targetModel.getObjectByName('mixamorig_LeftArm');
      const rightForeArm = targetModel.getObjectByName('RightForeArm') || targetModel.getObjectByName('mixamorig_RightForeArm');
      const leftForeArm = targetModel.getObjectByName('LeftForeArm') || targetModel.getObjectByName('mixamorig_LeftForeArm');
      const rightHand = targetModel.getObjectByName('RightHand') || targetModel.getObjectByName('mixamorig_RightHand');
      const leftHand = targetModel.getObjectByName('LeftHand') || targetModel.getObjectByName('mixamorig_LeftHand');

      if (!rightArm || !leftArm || !rightForeArm || !leftForeArm || !rightHand || !leftHand) return;

      clearInterval(handAnimInterval);

      let frame = 0;
      const helloInterval = setInterval(() => {
        frame++;
        rightArm.rotation.x = 0.8;
        rightArm.rotation.z = -0.4;
        rightForeArm.rotation.x = -1.4;
        rightForeArm.rotation.z = -1.2;
        rightHand.rotation.x = -0.2;
        rightHand.rotation.y = Math.sin(frame * 0.4) * 0.6;
        rightHand.rotation.z = Math.sin(frame * 0.4) * 0.3;

        leftArm.rotation.x = 1.2;
        leftArm.rotation.z = 0.3;

        if (frame > 40) {
          clearInterval(helloInterval);
          startSpeakingGestures();
        }
      }, 80);

      function startSpeakingGestures() {
        let t = 0;
        handAnimInterval = setInterval(() => {
          t += 0.5;
          leftArm.rotation.x = 0.8;
          leftArm.rotation.z = 0.4;
          leftForeArm.rotation.z = 2 - Math.sin(t * 0.4) * 0.3;
          leftHand.rotation.x = 0.1 + Math.sin(t * 0.5 + Math.PI) * 0.2;

          rightHand.rotation.x = -0.1;
          rightArm.rotation.x = 1.2;
          rightArm.rotation.z = 0.1;
          rightForeArm.rotation.x = 0.2;
          rightForeArm.rotation.z = -2 - Math.sin(t * 0.4) * 0.3;
        }, 30);
      }
    }

    function resetHands() {
      clearInterval(handAnimInterval);
      if (!model) return;
      const rightArm = model.getObjectByName('RightArm') || model.getObjectByName('mixamorig_RightArm');
      const leftArm = model.getObjectByName('LeftArm') || model.getObjectByName('mixamorig_LeftArm');
      const rightForeArm = model.getObjectByName('RightForeArm') || model.getObjectByName('mixamorig_RightForeArm');
      const leftForeArm = model.getObjectByName('LeftForeArm') || model.getObjectByName('mixamorig_LeftForeArm');
      const rightHand = model.getObjectByName('RightHand') || model.getObjectByName('mixamorig_RightHand');
      const leftHand = model.getObjectByName('LeftHand') || model.getObjectByName('mixamorig_LeftHand');

      if (rightArm && leftArm && rightForeArm && leftForeArm && rightHand && leftHand) {
        rightArm.rotation.x = 1.2; rightArm.rotation.z = 0.1;
        leftArm.rotation.x = 1.2; leftArm.rotation.z = -0.1;
        rightForeArm.rotation.x = 0.2; rightForeArm.rotation.z = -0.1;
        leftForeArm.rotation.x = 0.1; leftForeArm.rotation.z = 0.1;
        rightHand.rotation.x = -0.1;
        leftHand.rotation.x = 0.1;
      }
    }

    let talkifyPlayer = null;

    function speakText() {
      const text = "Hello there..! I’m Govind Pal, a results-driven Full Stack Developer with 4+ years of experience, currently working at Tech Mahindra. Skilled in Java, Spring Boot, Angular, and JavaScript, with strong expertise in PostgreSQL, MySQL, and MongoDB. I’ve delivered GIS-based solutions using Leaflet, GeoServer, and NCWMS, and collaborated with DRDO scientists and defense teams on innovative, tech-driven projects.";

      const speakBtn = document.getElementById('speakId');
      const skipBtn = document.getElementById('skipId');
      const askBtn = document.getElementById('askQuestions');

      if (speakBtn) speakBtn.disabled = true;
      if (skipBtn) skipBtn.disabled = false;
      if (askBtn) askBtn.disabled = true;
      if (typeof speechDiv !== 'undefined' && speechDiv) speechDiv.textContent = '';

      speakActive = true;
      typeText(text);
      foldHands(model);
      startLipSync();

      try {
        // 1. FIX: Initialize Talkify explicitly using browser-native local engines (No API keys or logins!)
        talkifyPlayer = new talkify.Html5Player();

        // 2. OPTIONAL CONFIG: Find a clean local male voice if available on the device
        const localVoices = window.speechSynthesis.getVoices();
        let selectedVoice = localVoices.find(v =>
          v.name.includes('Google UK English Male') ||
          v.name.includes('David') ||
          v.name.includes('Male')
        );

        if (selectedVoice) {
          // Use forceVoice with the native voice object for HTML5 Player mapping
          talkifyPlayer.forceVoice(selectedVoice);
        }

        // 3. Play the text directly
        talkifyPlayer.playText(text);

        // 4. FIX: Use Talkify's proper event listener mapping framework
        talkifyPlayer.subscribeTo({
          onItemFinished: function () {
            endSpeech();
          }
        });

      } catch (error) {
        console.error("Frictionless Voice Engine failed, falling back safely:", error);
        endSpeech();
      }
    }

    function skipSpeech() {
      if (!speakActive) return;
      // Cleanly kill the Talkify audio playback streams
      if (talkifyPlayer) {
        if (typeof talkifyPlayer.pause === "function") {
          talkifyPlayer.pause();
        }
        talkifyPlayer = null;
      }

      // 2. STABILITY FIX: Explicitly flush out the browser's audio queue
      window.speechSynthesis.cancel();
      endSpeech(true);

      model.visible = true;
    }

    function endSpeech(skipped = false) {
      speakActive = false;
      stopLipSync();
      resetHands();

      const speakBtn = document.getElementById('speakId');
      const skipBtn = document.getElementById('skipId');
      const askBtn = document.getElementById('askQuestions');

      if (speakBtn) speakBtn.disabled = false;
      if (skipBtn) skipBtn.disabled = true;
      if (askBtn) askBtn.disabled = false;

      if (skipped) {
        speechDiv.textContent = "Hello there..! I’m Govind Pal, a results-driven Full Stack Developer with 4+ years of experience, currently working at Tech Mahindra. Skilled in Java, Spring Boot, Angular, and JavaScript, with strong expertise in PostgreSQL, MySQL, and MongoDB. I’ve delivered GIS-based solutions using Leaflet, GeoServer, and NCWMS, and collaborated with DRDO scientists and defense teams on innovative, tech-driven projects.";
      }
      appendPortfolioAnchor();
    }

    function appendPortfolioAnchor() {
      // Prevent adding duplicate links if one already exists
      if (document.getElementById('portfolioLinkRef')) return;

      const portfolioLink = document.createElement('a');
      portfolioLink.id = "portfolioLinkRef";
      portfolioLink.href = "https://govindpal5101999.github.io/portfolio/";
      portfolioLink.textContent = "🔗 Visit My Portfolio";
      portfolioLink.target = "_blank";
      portfolioLink.style.display = "block";
      portfolioLink.style.marginTop = "15px";
      portfolioLink.style.color = "#00ff99";
      portfolioLink.style.textDecoration = "underline";
      portfolioLink.style.fontWeight = "bold";
      portfolioLink.classList.add('blinking');
      portfolioLink.addEventListener('click', () => { portfolioLink.classList.remove('blinking'); });
      speechDiv.appendChild(portfolioLink);
    }

    function stopSpeech() {
      window.speechSynthesis.cancel();
    }

    function startLipSync() {
      clearInterval(lipInterval);
      const mouth = document.getElementById("mouth"); // Ensure mouth element exists
      if (!mouth) return;

      lipInterval = setInterval(() => {
        const open = Math.random() * 0.8 + 0.2;
        // FIXED: Added missing backticks and fixed CSS space syntax
        mouth.style.transform = `translateX(-50%) scaleY(${open})`;
      }, 80);
    }

    function stopLipSync() {
      clearInterval(lipInterval);
      const mouth = document.getElementById("mouth");
      if (mouth) mouth.style.transform = 'translateX(-50%) scaleY(0.1)';
    }

    function typeText(text) {
      let i = 0;
      const interval = setInterval(() => {
        if (!speakActive) {
          clearInterval(interval);
          return;
        }
        speechDiv.textContent += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
      }, 70);
    }

    function animate() {
      requestAnimationFrame(animate);

      if (clock && mixer) {
        const delta = clock.getDelta();
        mixer.update(delta);
      }

      if (particleMesh) {
        const positions = particleMesh.geometry.attributes.position.array;
        const time = performance.now() * 0.001;
        for (let i = 0; i < positions.length; i += 3) {
          const speed = particleSpeeds[i / 3] || 0.001;
          positions[i + 0] += Math.sin(time * speed + i) * 0.002;
          positions[i + 1] += Math.cos(time * speed + i * 0.3) * 0.002;
          positions[i + 2] += Math.sin(time * speed + i * 0.5) * 0.002;
        }
        particleMesh.geometry.attributes.position.needsUpdate = true;
        particleMesh.rotation.y += 0.0005;
      }
      if (renderer && scene && camera) renderer.render(scene, camera);
      if (controls) controls.update();
    }

    async function handleUserMessage() {
      const input = document.getElementById("userInput");
      if (!input) return;
      const question = input.value.trim();
      if (!question) return;

      speechDiv.innerHTML = "";
      const p = document.createElement("p");
      p.textContent = "👤 You: " + question;
      p.style.color = "#00ffaa";
      speechDiv.appendChild(p);
      input.value = "";

      let answer = getLocalResponse(question.toLowerCase());
      if (!answer) {
        answer = "I'm Govind Pal, your 3D AI assistant! I can tell you about my engineering background at Tech Mahindra, DRDO projects, or GIS tracking tools.";
      }

      const reply = document.createElement("p");
      reply.textContent = "🤖 Govind: " + answer;
      reply.style.marginTop = "10px";
      reply.style.color = "#00ff99";
      speechDiv.appendChild(reply);
      speechDiv.scrollTop = speechDiv.scrollHeight;
      speakResponse(answer);
    }

    function getLocalResponse(q) {
      const query = q.toLowerCase().trim();
      const responses = {
        greeting: { keywords: ['hello', 'hi', 'hey', 'greetings'], answer: "Hey there! I'm Govind Pal, ready to answer your questions. What's on your mind?" },
        name: { keywords: ['your name', 'who are you', 'introduce yourself', 'name'], answer: "My name is Govind Pal, a passionate full-stack developer with a knack for building innovative solutions." },
        about: { keywords: ['about yourself', 'tell me about you', 'who is govind', 'what do you do', 'describe yourself'], answer: "I'm Govind Pal, a software engineer with over 4 years of experience at Tech Mahindra, specializing in full-stack development and GIS-based solutions." },
        skills: { keywords: ['skills', 'technologies', 'expertise', 'what can you do', 'tech stack', 'programming'], answer: "I'm skilled in Java, Spring Boot, Angular, JavaScript, PostgreSQL, and MongoDB. I also work with GIS mapping libraries." },
        portfolio: { keywords: ['portfolio', 'projects', 'github', 'work samples', 'your work', 'project links', 'resume'], answer: "Here’s a direct link to my portfolio where you can explore my projects live!" },
        experience: { keywords: ['experience', 'background', 'work history', 'career', 'years of experience', 'professional journey'], answer: "I have 4.5 years of experience as a full-stack developer, currently working at Tech Mahindra. Previously, I built GIS solutions and collaborated with DRDO scientists." },
        gis: { keywords: ['gis', 'geographic', 'mapping', 'spatial', 'maps'], answer: "I specialize in GIS-based solutions, leveraging my skills in Java and Angular to build mapping tools using libraries like Leaflet, OpenLayers, and Cesium." },
        drdo: { keywords: ['drdo', 'defense', 'collaborate', 'military', 'research organization'], answer: "I've had the privilege of collaborating with DRDO scientists and defense officers on tech-driven projects, focusing on video communication layers." },
        companies: { keywords: ['recent company', 'company names', 'current company', 'total companies', 'name of companies you worked'], answer: "I’ve worked across four organizations: DRDO (Ministry of Defence), MicroGenesis TechSoft, Trinity Mobility, and currently serving as a Full Stack Developer at Tech Mahindra." }
      };

      let bestMatch = { score: 0, key: null };
      for (const key in responses) {
        const { keywords } = responses[key];
        let score = 0;
        for (const keyword of keywords) {
          if (query.includes(keyword)) score += keyword.split(' ').length;
        }
        if (score > bestMatch.score) {
          bestMatch = { score, key };
        }
      }

      if (bestMatch.score === 0) {
        // FIXED: Wrapped the literal return fallback string in backticks
        return `I'm Govind Pal, a full-stack developer. Your question about "${q}" is interesting! Could you ask about my skills, projects, or experience?`;
      }

      if (bestMatch.key === 'portfolio') {
        setTimeout(() => {
          if (typeof appendPortfolioAnchor === 'function') appendPortfolioAnchor();
        }, 120);
      }
      return responses[bestMatch.key].answer;
    }

    function speakResponse(text) {
      stopSpeech();
      const utter = new SpeechSynthesisUtterance(text);
      if (typeof configureVoiceParameters === 'function') configureVoiceParameters(utter);

      const speakBtn = document.getElementById("speakId");
      if (speakBtn) speakBtn.disabled = true;
      speakActive = true;

      if (typeof foldHands === 'function') foldHands(model);
      startLipSync();
      window.speechSynthesis.speak(utter);

      utter.onend = () => {
        stopLipSync();
        if (typeof resetHands === 'function') resetHands();
        speakActive = false;
        if (speakBtn) speakBtn.disabled = false;
      };
    }

    // FIXED: Added missing closing bracket structure at the bottom of the script
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
      window.speechSynthesis.onvoiceschanged = () => {
        console.log("AI Speech Systems Primed.");
      };
    }

  </script>

</body>

</html>
